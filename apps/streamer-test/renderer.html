<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WPK Streamer Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0e0f13; color: #e8eaed; padding: 20px; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    button { cursor: pointer; font: inherit; background: #2a2d36; color: #e8eaed; border: 1px solid #3a3e49; padding: 8px 14px; border-radius: 8px; }
    button:hover { background: #343845; }
    button.primary { background: linear-gradient(180deg, #2dd879, #20a35e); color: #0b2a18; font-weight: 600; border-color: #1d8a4f; }
    input { font: inherit; background: #1a1c23; color: #e8eaed; border: 1px solid #3a3e49; padding: 8px 10px; border-radius: 8px; width: 120px; }
    .preview { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; position: relative; }
    .preview video { width: 100%; height: 100%; object-fit: contain; }
    .stats { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.7); color: #fff; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-family: monospace; }
    .stats .fps { color: #2dd879; font-size: 18px; font-weight: bold; }
    .status { margin-top: 12px; font-size: 13px; opacity: 0.7; }
    .sources { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .source { cursor: pointer; border: 2px solid #3a3e49; border-radius: 8px; overflow: hidden; width: 160px; }
    .source:hover { border-color: #2dd879; }
    .source.selected { border-color: #2dd879; }
    .source img { width: 100%; display: block; }
    .source .name { font-size: 11px; padding: 4px; text-align: center; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <h1>WPK Streamer - Teste de FPS</h1>

  <div class="controls">
    <input id="code" placeholder="Código da sala" />
    <button id="connect" class="primary">Conectar e Transmitir</button>
    <button id="pick">Escolher fonte</button>
    <button id="stop">Parar</button>
  </div>

  <div id="sources" class="sources"></div>

  <div class="preview">
    <video id="preview" muted autoplay playsinline></video>
    <div class="stats">
      <div class="fps" id="fps">-- FPS</div>
      <div id="res">--</div>
      <div id="bitrate">--</div>
      <div id="encoder">--</div>
    </div>
  </div>
  <div class="status" id="status">Pronto. Cole o código da sala e clique Conectar.</div>

  <script src="renderer.js"></script>
</body>
</html>
