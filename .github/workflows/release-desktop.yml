name: Release Desktop App

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag de release existente (ex: v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build @wpk/shared
        run: pnpm --filter @wpk/shared build

      - name: Build desktop renderer + main
        working-directory: apps/desktop
        run: pnpm build

      - name: Package macOS (DMG + ZIP, yml metadata)
        if: matrix.platform == 'mac'
        working-directory: apps/desktop
        run: pnpm exec electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package Windows (NSIS + yml metadata)
        if: matrix.platform == 'win'
        working-directory: apps/desktop
        run: pnpm exec electron-builder --win --publish never

      - name: List artifacts
        shell: bash
        working-directory: apps/desktop/release
        run: ls -la

      - name: Resolve target tag
        id: resolve_tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          files: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.exe
            apps/desktop/release/*.yml
            apps/desktop/release/*.blockmap
          fail_on_unmatched_files: false
